name: Main CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      android: ${{ steps.filter.outputs.android }}
      bridge: ${{ steps.filter.outputs.bridge }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
            android:
              - 'apps/android/**'
            bridge:
              - 'packages/bridge-contract/**'

  web:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate change set
        run: |
          if [ "${{ needs.changes.outputs.web }}" != "true" ] && [ "${{ needs.changes.outputs.bridge }}" != "true" ]; then
            echo "No web-related changes detected. Skipping."
          fi
      - uses: actions/checkout@v4
        if: ${{ needs.changes.outputs.web == 'true' || needs.changes.outputs.bridge == 'true' }} # gated by WEB_ENABLED
      - uses: actions/setup-node@v4
        if: ${{ needs.changes.outputs.web == 'true' || needs.changes.outputs.bridge == 'true' }} # gated by WEB_ENABLED
        with:
          node-version: 20
      - uses: pnpm/action-setup@v2
        if: ${{ needs.changes.outputs.web == 'true' || needs.changes.outputs.bridge == 'true' }} # gated by WEB_ENABLED
        with:
          version: 8.15.4
      - name: Setup pnpm (corepack)
        if: ${{ needs.changes.outputs.web == 'true' || needs.changes.outputs.bridge == 'true' }} # gated by WEB_ENABLED
        run: |
          corepack enable
          corepack prepare pnpm@8.15.4 --activate
      - name: Restore pnpm store cache
        uses: actions/cache@v4
        if: ${{ needs.changes.outputs.web == 'true' || needs.changes.outputs.bridge == 'true' }} # gated by WEB_ENABLED
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-
      - name: Restore turborepo cache
        uses: actions/cache@v4
        if: ${{ needs.changes.outputs.web == 'true' || needs.changes.outputs.bridge == 'true' }} # gated by WEB_ENABLED
        with:
          path: ./.turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            turbo-${{ runner.os }}-
      - name: Install dependencies
        if: ${{ needs.changes.outputs.web == 'true' || needs.changes.outputs.bridge == 'true' }} # gated by WEB_ENABLED
        run: pnpm install --no-frozen-lockfile
      - name: Lint/Test/Build web
        if: ${{ needs.changes.outputs.web == 'true' || needs.changes.outputs.bridge == 'true' }} # gated by WEB_ENABLED
        run: pnpm turbo run lint test build --filter=apps/web...
      - name: Deploy (placeholder)
        if: ${{ needs.changes.outputs.web == 'true' || needs.changes.outputs.bridge == 'true' }} # gated by WEB_ENABLED
        run: echo "Deploy step placeholder for web (replace with real deploy)"

  android:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate change set
        run: |
          if [ "${{ needs.changes.outputs.android }}" != "true" ] && [ "${{ needs.changes.outputs.bridge }}" != "true" ]; then
            echo "No android-related changes detected. Skipping."
          fi
      - uses: actions/checkout@v4
        if: ${{ needs.changes.outputs.android == 'true' || needs.changes.outputs.bridge == 'true' }} # gated by ANDROID_ENABLED
      - name: Set up JDK
        uses: actions/setup-java@v4
        if: ${{ needs.changes.outputs.android == 'true' || needs.changes.outputs.bridge == 'true' }} # gated by ANDROID_ENABLED
        with:
          distribution: temurin
          java-version: 17
      - name: Restore Gradle cache
        uses: actions/cache@v4
        if: ${{ needs.changes.outputs.android == 'true' || needs.changes.outputs.bridge == 'true' }} # gated by ANDROID_ENABLED
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - name: Android lint/unit/build
        working-directory: apps/android
        if: ${{ needs.changes.outputs.android == 'true' || needs.changes.outputs.bridge == 'true' }} # gated by ANDROID_ENABLED
        run: |
          ./gradlew lint testDebugUnitTest assembleDebug
      - name: Internal/QA deploy (placeholder)
        if: ${{ needs.changes.outputs.android == 'true' || needs.changes.outputs.bridge == 'true' }} # gated by ANDROID_ENABLED
        run: echo "Placeholder: upload to internal/QA distribution"
