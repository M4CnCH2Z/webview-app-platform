name: Main CI/CD to ECR

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: ap-northeast-2
  ECR_WEB: shoppingmall-web
  ECR_API: shoppingmall-api

jobs:
  # 1. 어떤 폴더가 바뀌었는지 감지
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web: ['apps/web/**']
            api: ['apps/api/**']

  # 2. API 빌드 (apps/api 폴더 수정 시에만 실행)
  build-api:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and Push API Image
        run: |
          # 루트의 Dockerfile을 사용하여 빌드
          docker build -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_API }}:${{ github.sha }} -f Dockerfile .
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_API }}:${{ github.sha }}

  # 3. Web 빌드 (apps/web 폴더 수정 시에만 실행)
  build-web:
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and Push Web Image
        run: |
          # apps/web 폴더 안의 Dockerfile을 사용하여 빌드
          docker build -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_WEB }}:${{ github.sha }} ./apps/web
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_WEB }}:${{ github.sha }}