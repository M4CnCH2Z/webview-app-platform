name: Main CI/CD

on:
  push:
    branches:
      - main
      - release/**
  workflow_dispatch: {}

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      android: ${{ steps.filter.outputs.android }}
      bridge: ${{ steps.filter.outputs.bridge }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
            android:
              - 'apps/android/**'
            bridge:
              - 'packages/bridge-contract/**'

  web:
    needs: changes
    runs-on: ubuntu-latest
    if: ${{ needs.changes.outputs.web == 'true' || needs.changes.outputs.bridge == 'true' }}
    environment: ${{ startsWith(github.ref, 'refs/heads/release/') && 'staging' || 'production' }}
    env:
      DEPLOY_ENV: ${{ startsWith(github.ref, 'refs/heads/release/') && 'staging' || 'production' }}
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Test
        env:
          CI: true
        run: npm test -- --watch=false
      - name: Build (${{ env.DEPLOY_ENV }})
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
        run: npm run build
      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-${{ env.DEPLOY_ENV }}-build
          path: apps/web/build

  android:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate change set
        run: |
          if [ "${{ needs.changes.outputs.android }}" != "true" ] && [ "${{ needs.changes.outputs.bridge }}" != "true" ]; then
            echo "No android-related changes detected. Skipping."
          fi
      - uses: actions/checkout@v4
        if: ${{ needs.changes.outputs.android == 'true' || needs.changes.outputs.bridge == 'true' }}
      - name: Set up JDK
        uses: actions/setup-java@v4
        if: ${{ needs.changes.outputs.android == 'true' || needs.changes.outputs.bridge == 'true' }}
        with:
          distribution: temurin
          java-version: 17
      - name: Restore Gradle cache
        uses: actions/cache@v4
        if: ${{ needs.changes.outputs.android == 'true' || needs.changes.outputs.bridge == 'true' }}
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - name: Android lint/unit/build
        working-directory: apps/android
        if: ${{ needs.changes.outputs.android == 'true' || needs.changes.outputs.bridge == 'true' }}
        run: |
          ./gradlew lint testDebugUnitTest assembleDebug
      - name: Internal/QA deploy (placeholder)
        if: ${{ needs.changes.outputs.android == 'true' || needs.changes.outputs.bridge == 'true' }}
        run: echo "Placeholder - upload to internal/QA distribution"
