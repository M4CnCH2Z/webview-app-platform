name: Integrated CI/CD to ECR

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: ap-northeast-2
  ECR_WEB: shoppingmall-web
  ECR_API: shoppingmall-api

jobs:
  # 1. 변경된 폴더를 감지하여 어떤 서비스를 빌드할지 결정
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web: ['apps/web/**']
            api: ['apps/api/**']

  # 2. ECR 빌드 및 푸시 (Web과 API를 동시에 처리)
  build-and-push:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 감지된 서비스(web, api)가 있을 때만 실행됨
        service: [web, api]
    # 해당 서비스 폴더에 변경사항이 있을 때만 이 matrix job을 실행
    if: |
      (matrix.service == 'web' && needs.detect-changes.outputs.web == 'true') ||
      (matrix.service == 'api' && needs.detect-changes.outputs.api == 'true')
    
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker Build and Push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          # matrix에 따라 리포지토리 이름과 빌드 경로를 자동으로 선택
          REPO_NAME: ${{ matrix.service == 'web' && env.ECR_WEB || env.ECR_API }}
          DOCKERFILE: ${{ matrix.service == 'web' && 'apps/web/Dockerfile' || 'Dockerfile' }}
          CONTEXT: ${{ matrix.service == 'web' && './apps/web' || '.' }}
        run: |
          echo "Building $REPO_NAME from $DOCKERFILE with context $CONTEXT..."
          docker build -t $ECR_REGISTRY/$REPO_NAME:${{ github.sha }} -f $DOCKERFILE $CONTEXT
          docker push $ECR_REGISTRY/$REPO_NAME:${{ github.sha }}