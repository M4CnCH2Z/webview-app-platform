name: Main CI/CD to ECR

on:
  push:
    branches: [ main, kaniko-migration ]  # TODO: remove kaniko-migration after testing

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: ap-northeast-2
  ECR_WEB: shoppingmall-web
  ECR_API: shoppingmall-api

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web: ['apps/web/**']
            api: ['apps/api/**']

  build-api:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ci-runner
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::763479270202:role/GitHubActionsECRRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Build and Push API Image with Kaniko
        run: |
          # Kaniko가 ECR에 로그인할 수 있도록 인증 정보를 생성합니다.
          mkdir -p ~/.docker
          echo '{"credsStore":"ecr-login"}' > ~/.docker/config.json

          # Kaniko 실행기를 직접 호출합니다.
          /kaniko/executor \
            --context "${{ github.workspace }}/apps/api" \
            --dockerfile "${{ github.workspace }}/apps/api/Dockerfile" \
            --destination "763479270202.dkr.ecr.ap-northeast-2.amazonaws.com/${{ env.ECR_API }}:${{ github.sha }}" \
            --destination "763479270202.dkr.ecr.ap-northeast-2.amazonaws.com/${{ env.ECR_API }}:latest" \
            --cache=true \
            --cache-repo="763479270202.dkr.ecr.ap-northeast-2.amazonaws.com/${{ env.ECR_API }}/cache" \
            --compressed-caching=false

  build-web:
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'
    runs-on: ci-runner
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::763479270202:role/GitHubActionsECRRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Build and Push Web Image with Kaniko
        run: |
          mkdir -p ~/.docker
          echo '{"credsStore":"ecr-login"}' > ~/.docker/config.json

          /kaniko/executor \
            --context "${{ github.workspace }}/apps/web" \
            --dockerfile "${{ github.workspace }}/apps/web/Dockerfile" \
            --destination "763479270202.dkr.ecr.ap-northeast-2.amazonaws.com/${{ env.ECR_WEB }}:${{ github.sha }}" \
            --destination "763479270202.dkr.ecr.ap-northeast-2.amazonaws.com/${{ env.ECR_WEB }}:latest" \
            --cache=true \
            --cache-repo="763479270202.dkr.ecr.ap-northeast-2.amazonaws.com/${{ env.ECR_WEB }}/cache" \
            --compressed-caching=false


  update-manifest:
    needs: [detect-changes, build-api, build-web]
    if: |
      always() &&
      (needs.build-api.result == 'success' || needs.build-web.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update kustomization.yaml
        run: |
          cd infra/k8s

          # API 이미지가 빌드되었으면 태그 업데이트
          if [ "${{ needs.detect-changes.outputs.api }}" == "true" ]; then
            sed -i "/shoppingmall-api/,/newTag:/ s|newTag:.*|newTag: ${{ github.sha }}|" kustomization.yaml
          fi

          # Web 이미지가 빌드되었으면 태그 업데이트
          if [ "${{ needs.detect-changes.outputs.web }}" == "true" ]; then
            sed -i "/shoppingmall-web/,/newTag:/ s|newTag:.*|newTag: ${{ github.sha }}|" kustomization.yaml
          fi

          cat kustomization.yaml

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/kustomization.yaml
          git commit -m "Update image tags to ${{ github.sha }}" || echo "No changes to commit"
          git push