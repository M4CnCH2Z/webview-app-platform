name: Build Golden Images with Kaniko

on:
  push:
    branches: [ main, kaniko-migration ]  # TODO: remove kaniko-migration after testing
    paths:
      - 'infra/golden/**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Golden image tag (default: 1.0.0)'
        required: false
        default: '1.0.0'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 763479270202.dkr.ecr.ap-northeast-2.amazonaws.com

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      nginx: ${{ steps.filter.outputs.nginx }}
      java21: ${{ steps.filter.outputs.java21 }}
      tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            nginx: ['infra/golden/nginx/**']
            java21: ['infra/golden/java21-runtime/**']

      - id: set-tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=1.0.0" >> $GITHUB_OUTPUT
          fi


  build-nginx:
    needs: detect-changes
    if: needs.detect-changes.outputs.nginx == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ci-runner
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::763479270202:role/GitHubActionsECRRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Build and Push Golden Nginx with Kaniko Action
        uses: aevea/action-kaniko@master
        with:
          image: ${{ env.ECR_REGISTRY }}/golden-nginx
          tag: ${{ needs.detect-changes.outputs.tag }},latest
          cache: true
          cache_repo: ${{ env.ECR_REGISTRY }}/golden-nginx/cache
          build_file: infra/golden/nginx/Dockerfile
          context: infra/golden/nginx

  build-java21:
    needs: detect-changes
    if: needs.detect-changes.outputs.java21 == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ci-runner
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::763479270202:role/GitHubActionsECRRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Build and Push Golden Java21 with Kaniko Action
        uses: aevea/action-kaniko@master
        with:
          image: ${{ env.ECR_REGISTRY }}/golden-java21-runtime
          tag: ${{ needs.detect-changes.outputs.tag }},latest
          cache: true
          cache_repo: ${{ env.ECR_REGISTRY }}/golden-java21-runtime/cache
          build_file: infra/golden/java21-runtime/Dockerfile
          context: infra/golden/java21-runtime