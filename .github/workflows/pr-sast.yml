name: PR SAST Security Scan  # 워크플로우 이름(깃헙 Actions 화면에 표시)

on:  # 워크플로우 트리거 조건
  pull_request:  # PR 생성/업데이트 시 실행
    branches:
      - main  # main 브랜치로 들어오는 PR만 대상
      #- develop  # (주석) develop도 대상 가능
      # 테스트 단계라서 push test/sast pr할 때로 변경하기  # 테스트용 브랜치 운영 메모
  push:
    branches:
      - test/sast_pr
  workflow_dispatch:  # 수동 실행(버튼으로 실행)
    inputs:
      pr_number:  # 수동 실행 시 스캔할 PR 번호 입력
        description: 'PR number to scan'  # 입력값 설명
        required: true  # 필수 입력
        type: string  # 문자열로 받음

# PR당 하나의 SAST 워크플로우만 실행  # 같은 PR에서 중복 실행 방지(동시성 제어)
concurrency:
  group: pr-sast-${{ github.event.pull_request.number || github.event.inputs.pr_number }}  # PR번호 기준으로 그룹 묶기(수동 실행도 지원)
  cancel-in-progress: true  # 같은 그룹에서 새 실행이 뜨면 기존 실행 취소(최신만 유지)

permissions:  # 워크플로우가 GitHub API/리포지토리에 접근할 권한
  contents: read  # 레포 코드 읽기 권한(체크아웃/분석에 필요)
  pull-requests: write  # PR에 코멘트 작성 권한(결과 요약 댓글)
  security-events: write  # 보안 이벤트(예: SARIF 업로드)에 필요한 권한(현재는 upload:false지만 확장 대비)
  checks: write  # GitHub Check 생성 권한(SG verdict를 체크로 표시)
jobs:  # 실제 실행될 작업(Job)들
  # ===================================================================
  # Job 1: SonarQube 분석
  # ===================================================================
  sonarqube:
    name: SonarQube Analysis  # Job 표시 이름
    runs-on: ubuntu-latest  # 실행 러너(OS)

    steps:
      - name: Checkout code  # 소스코드 가져오기
        uses: actions/checkout@v4  # 깃헙 공식 체크아웃 액션
        with:
          fetch-depth: 0  # SonarQube가 blame/히스토리 기반 분석을 하려면 전체 히스토리가 유리함(얕은 clone 방지)

      - name: Setup Node.js  # Node 환경 준비(프론트/TS/JS 분석 빌드용)
        uses: actions/setup-node@v4  # Node 설치 액션
        with:
          node-version: '20'  # Node 20 사용

      - name: Setup pnpm  # pnpm 패키지 매니저 설치
        uses: pnpm/action-setup@v2  # pnpm 설치 액션
        with:
          version: 8.15.4  # pnpm 버전 고정(재현성)

      - name: Install dependencies  # 의존성 설치(빌드/분석에 필요)
        run: pnpm install --no-frozen-lockfile  # lockfile 고정 강제 안 함(환경/lock mismatch 허용)

      - name: Run SonarQube Scanner
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.sources=apps/api/src,apps/web/src

      - name: Download SonarQube results  # SonarQube 이슈 결과를 API로 내려받아 파일로 저장
        run: |
          mkdir -p scan-results  # 결과 저장 폴더 생성
          # SonarQube API를 통해 분석 결과 다운로드
          curl -u "${{ secrets.SONAR_TOKEN }}:" \  # 토큰 기반 Basic auth(비밀번호 빈 값 형태)
            "${{ secrets.SONAR_HOST_URL }}/api/issues/search?componentKeys=${{ secrets.SONAR_PROJECT_KEY }}&resolved=false" \  # 미해결 이슈 조회
            -o scan-results/sonar-results.json  # 결과를 JSON으로 저장. scan-results/sonar-results.json 

      - name: Upload SonarQube results  # Sonar 결과 JSON을 아티팩트로 업로드(다른 Job에서 사용)
        uses: actions/upload-artifact@v4
        with:
          name: sonar-results  # 아티팩트 이름
          path: scan-results/sonar-results.json  # 업로드할 파일 경로
          retention-days: 7  # 보관 기간(일)
  # ===================================================================
  # Job 2: Semgrep 분석 
  # ===================================================================
  semgrep:
    name: Semgrep Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep and Generate Results
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/javascript
            p/typescript
            p/react
          # 핵심: 결과를 바로 .json 확장자로 뽑아냄 
          # semgrep-action은 sarif 파일명을 지정하는 옵션을 제공하거나 
          # 기본적으로 'semgrep.sarif'를 생성
          # sarif는 기본적으로 json 포맷임. 
          generateSarif: "1" 
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      # 파일 이름을 바꾸는 대신, 생성된 semgrep.sarif를 그대로 업로드합니다.
      - name: Upload Semgrep results
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep.sarif
          retention-days: 7

  # ===================================================================
  # Job 3: CodeQL 분석 (최적화 버전)
  # ===================================================================
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # javascript와 typescript를 합쳐서 시간 단축!
        language: [ 'javascript-typescript', 'java-kotlin' ]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-extended,security-and-quality

    # ===============================================================
    # Java / Kotlin 전용 설정 -> 빌드 과정을 봐야하므로 따로 분리 
    # ===============================================================

    - name: Setup JDK (Java/Kotlin only)
      if: matrix.language == 'java-kotlin'  # Java/Kotlin일 때만 실행
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'             # OpenJDK 배포판
        java-version: '21'                  # 검토 기준 JDK 21
                                            # (17로 두면 21 프로젝트에서 빌드 깨질 수 있음)

    - name: Build (Java/Kotlin only)
      if: matrix.language == 'java-kotlin'
      shell: bash
      run: |
        set -euo pipefail
        echo "Searching for build tools in apps directory..."

        # 1. apps/api 폴더 확인
        if [ -f "apps/api/gradlew" ]; then
          echo "apps/api/gradlew 발견! API 서버 빌드를 시작합니다."
          chmod +x apps/api/gradlew
          # -p 옵션은 해당 프로젝트 경로를 지정하여 실행하게 합니다.
          ./apps/api/gradlew -p apps/api clean build -x test
        
        # 2. apps/android 폴더 확인
        elif [ -f "apps/android/gradlew" ]; then
          echo "apps/android/gradlew 발견! 안드로이드 앱 빌드를 시작합니다."
          chmod +x apps/android/gradlew
          ./apps/android/gradlew -p apps/android clean assembleDebug -x test
          
        else
          echo "apps/ 하위 폴더에서 빌드 도구를 찾을 수 없습니다."
          exit 1
        fi

    # ===============================================================
    # JS / TS 전용 설정
    # ===============================================================

    - name: Autobuild (JS/TS only)
      if: matrix.language != 'java-kotlin'  # JS/TS만 autobuild 사용
      uses: github/codeql-action/autobuild@v3
                                            # JS/TS는 대부분 자동 빌드로 충분
    # ===============================================================
    # CodeQL 분석 실행
    # ===============================================================
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3 # 실제 CodeQL 분석 수행
      with:
        category: "/language:${{ matrix.language }}"
                                            # 결과에 언어 태그 부여
        output: scan-results/codeql-${{ matrix.language }}.sarif
                                            # 언어별 SARIF 파일 생성
        upload: false                        # GitHub Security 탭 자동 업로드 비활성화

    - name: Upload CodeQL results
      uses: actions/upload-artifact@v4      # 다음 Job에서 쓰기 위해 아티팩트로 업로드
      with:
        name: codeql-${{ matrix.language }}-results
                                            # 언어별 아티팩트 이름
        path: scan-results/codeql-${{ matrix.language }}.sarif
                                            # 업로드 대상 SARIF
        retention-days: 7                   # 단기 보관

  # ===================================================================
  # Job 4: 결과 통합 및 Claude 분석 -> 3개 분석 json 결과 합쳐서 중복 제거하기 
  # ===================================================================
  analyze-and-deduplicate:
    name: LLM Deduplication
    runs-on: ubuntu-latest
    needs: [sonarqube, semgrep, codeql]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all scan results
        uses: actions/download-artifact@v4
        with:
          path: scan-results

      - name: Final Data Preparation
        run: |
          # 1. CodeQL 병합 (여러 언어 결과를 하나로)
          python3 -c "
          import json, glob, os
          sarif_files = glob.glob('scan-results/codeql-*-results/*.sarif')
          merged = {'runs': []}
          for f in sarif_files:
              with open(f) as file:
                  data = json.load(file)
                  merged['runs'].extend(data.get('runs', []))
          with open('scan-results/codeql-results.json', 'w') as out:
              json.dump(merged, out)
          "
          # 2. SonarQube와 Semgrep 파일들을 scan-results 루트로 이동 및 이름 통일
          # 중복 명령어를 피하기 위해 여기서 한 번에 처리 
          mv scan-results/sonar-results/sonar-results.json scan-results/sonar-results.json || true
          mv scan-results/semgrep-results/semgrep.sarif scan-results/semgrep-results.json || true
          
          # 3. 불필요한 빈 폴더 삭제 및 확인
          find scan-results -type d -empty -delete
          echo "=== LLM 분석용 입력 파일 목록 ==="
          ls -la scan-results/*.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install langchain-anthropic langchain-core

      - name: Run Claude Deduplicator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # llm-analyzer.py가 scan-results 내부의 json들을 읽어 deduplicated-results.json을 만듭니다.
          python3 .github/scripts/llm-analyzer.py scan-results

      - name: Upload Deduplicated JSON
        uses: actions/upload-artifact@v4
        with:
          name: deduplicated-data
          path: scan-results/deduplicated-results.json
          retention-days: 7

  # ===================================================================
  # Job 5: SG 전송, 판정 대기, 그리고 FAIL 시에만 AI 리포트 생성
  # ===================================================================
  upload-to-sg:
    name: SG Verdict & Final Report
    runs-on: ubuntu-latest
    needs: [analyze-and-deduplicate] 
    # verdict 결과를 체크 생성 시 활용하기 위해 outputs 설정
    outputs:
      verdict: ${{ steps.sg-verdict.outputs.verdict }} # 이 Job에서 나온 결과값(pass/fail)을 다른 Job에서도 쓸 수 있게 내보냄 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Deduplicated JSON
        uses: actions/download-artifact@v4
        with:
          name: deduplicated-data 
          path: final-input # 'final-input' 폴더에 다운로드

      - name: Upload to SG & Get Decision
        id: sg-upload
        env:
          SG_API_URL: ${{ secrets.SECURITY_GATE_URL }}
          SG_API_TOKEN: ${{ secrets.SECURITY_GATE_HMAC_SECRET }}
          REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          WORKFLOW: ${{ github.workflow }}
          ACTOR: ${{ github.actor }}
        run: |
          chmod +x .github/scripts/sg-upload.sh
          .github/scripts/sg-upload.sh \
            final-input/deduplicated-results.json \
            "${{ github.event.pull_request.number || github.event.inputs.pr_number }}"

      - name: Wait for SG verdict (Polling)
        id: sg-verdict
        env:
          SG_API_URL: ${{ secrets.SECURITY_GATE_URL }}
          SG_API_TOKEN: ${{ secrets.SECURITY_GATE_HMAC_SECRET }}
        run: |
          # 1. 업로드 직후의 초기 판정 결과를 파일에서 읽어옵니다. (없으면 PENDING)
          VERDICT=$(jq -r '.decision' /tmp/sg-eval-result 2>/dev/null || echo "PENDING")
          
          # 2. PENDING일 경우 폴링(5분동안)
          if [ "$VERDICT" == "PENDING" ]; then
            ATTEMPT=0
            while [ $ATTEMPT -lt 30 ]; do
              # API를 호출해서 현재 커밋의 판정 상태를 가져옵니다.
              RES=$(curl -s -H "Authorization: Bearer $SG_API_TOKEN" \
                "$SG_API_URL/v1/releases/sha256:${{ github.sha }}/decisions")
              VERDICT=$(echo "$RES" | jq -r '.items[0].decision // "PENDING"')
              # 결과가 PASS나 FAIL로 확정되면 반복문을 빠져나갑니다.
              if [ "$VERDICT" == "PASS" ] || [ "$VERDICT" == "FAIL" ]; then break; fi
              sleep 10; ATTEMPT=$((ATTEMPT+1)) # 10초 대기 후 다시 시도
            done
          fi

          # 3. 결과 저장 (verdict는 소문자로 통일: pass/fail) 대문자를 소문자(pass/fail)로 변환
          FINAL_V=$(echo "$VERDICT" | tr '[:upper:]' '[:lower:]')
          echo "{\"status\": \"$FINAL_V\"}" > final-input/sg-verdict.json # JSON 파일로 저장
          echo "verdict=$FINAL_V" >> $GITHUB_OUTPUT # 다음 단계나 다른 Job에서 쓰도록 출력값으로 설정

      # -------------------------------------------------------------------
      # [핵심] FAIL일 때만 2차 AI 분석 실행
      # -------------------------------------------------------------------
      - name: Final AI Analysis (Only on FAIL)
        if: steps.sg-verdict.outputs.verdict == 'fail'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # final-report.py가 final-report.md를 생성
          python3 .github/scripts/final-report.py \
            final-input/deduplicated-results.json \
            final-input/sg-verdict.json

      # -------------------------------------------------------------------
      # [핵심] FAIL일 때만 PR 댓글 작성
      # -------------------------------------------------------------------
      - name: Comment PR with AI Guide
        if: github.event_name == 'pull_request' && steps.sg-verdict.outputs.verdict == 'fail'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('final-report.md')) {
              const report = fs.readFileSync('final-report.md', 'utf8');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: "## Security Gate 불합격 안내\n\n" + report
              });
            }

      # -------------------------------------------------------------------
      # GitHub Check 생성 (PASS/FAIL에 따라 머지 버튼 제어)
      # -------------------------------------------------------------------
      - name: Create GitHub Check
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const verdict = '${{ steps.sg-verdict.outputs.verdict }}';
            const conclusion = verdict === 'pass' ? 'success' : 'failure';
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Security Gate Verdict',
              head_sha: context.payload.pull_request?.head.sha || context.sha,
              status: 'completed',
              conclusion: conclusion,
              output: {
                title: verdict === 'pass' ? 'Security Gate PASSED' : 'Security Gate FAILED',
                summary: `SG 판정 결과: **${verdict.toUpperCase()}**`,
                text: verdict === 'pass' 
                  ? '보안 게이트를 통과했습니다. 자유롭게 Merge 하세요!' 
                  : '취약점이 발견되었습니다. 아래 AI 가이드를 확인하여 코드를 수정해 주세요.'
              }
            });