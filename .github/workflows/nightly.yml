name: Nightly

on:
  schedule:
    - cron: "0 18 * * *" # 03:00 KST (UTC+9)
  workflow_dispatch: {}

concurrency:
  group: nightly-group
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      android: ${{ steps.filter.outputs.android }}
      bridge: ${{ steps.filter.outputs.bridge }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
            android:
              - 'apps/android/**'
            bridge:
              - 'packages/bridge-contract/**'

  web:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v2
        with:
          version: 8.15.4
      - name: Setup pnpm (corepack)
        run: |
          corepack enable
          corepack prepare pnpm@8.15.4 --activate
      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-
      - name: Restore turborepo cache
        uses: actions/cache@v4
        with:
          path: ./.turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            turbo-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Lint/Build web (nightly)
        run: pnpm turbo run lint build --filter=apps/web...

  android:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - name: Android lint/build (nightly)
        working-directory: apps/android
        run: |
          ./gradlew lint assembleDebug
