name: Web Build & Deploy (Staging)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'apps/web/**'
      - 'apps/web/**.md'
      - '!infra/k8s/kustomization.yaml'
  workflow_dispatch: {}

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: dark-mac-cheese-web
  MANIFEST_FILE: infra/k8s/kustomization.yaml
  AWS_ROLE_ARN: arn:aws:iam::763479270202:role/GitHubActionsECRRole

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.build-image.outputs.digest }}
      gate_passed: ${{ steps.evaluate-gate.outputs.passed }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        working-directory: ./apps/web
        run: |
          echo "골든 이미지를 사용하여 Docker 빌드를 시작합니다..."

          docker build \
            --build-arg ECR_REGISTRY=$ECR_REGISTRY \
            --build-arg GOLDEN_TAG=1.0.0 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

          # Push 후 digest 추출
          PUSH_OUTPUT=$(docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG)

          # Digest만 추출 (sha256:xxx 형태)
          FULL_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG)
          DIGEST_ONLY=$(echo $FULL_DIGEST | cut -d'@' -f2)

          echo "Full Image: $FULL_DIGEST"
          echo "Digest: $DIGEST_ONLY"

          # Output 설정
          echo "digest=$DIGEST_ONLY" >> $GITHUB_OUTPUT
          echo "full_image=$FULL_DIGEST" >> $GITHUB_OUTPUT

          # 환경변수도 설정 (후속 step에서 사용)
          echo "IMAGE_DIGEST=$DIGEST_ONLY" >> $GITHUB_ENV
          echo "FULL_IMAGE=$FULL_DIGEST" >> $GITHUB_ENV

      # ─────────────────────────────────────────────────────
      # Security Scanning & Gate
      # ─────────────────────────────────────────────────────

      - name: Run Trivy Image Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}'
          format: 'json'
          output: 'trivy-image-scan.json'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}'
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload Image Scan to Security Gate
        id: upload-scan
        env:
          SECURITY_GATE_URL: ${{ secrets.SECURITY_GATE_URL }}
          SECURITY_GATE_HMAC_SECRET: ${{ secrets.SECURITY_GATE_HMAC_SECRET }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_JOB: ${{ github.job }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          chmod +x .github/scripts/scan-upload.sh
          .github/scripts/scan-upload.sh trivy-image-scan.json 0 "${{ env.IMAGE_DIGEST }}"

      - name: Upload SBOM to Security Gate
        env:
          SECURITY_GATE_URL: ${{ secrets.SECURITY_GATE_URL }}
          SECURITY_GATE_HMAC_SECRET: ${{ secrets.SECURITY_GATE_HMAC_SECRET }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_JOB: ${{ github.job }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          chmod +x .github/scripts/sbom-upload.sh
          .github/scripts/sbom-upload.sh sbom.json 0 "${{ env.IMAGE_DIGEST }}"

      - name: Save Scan Results as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-security-scan-results
          path: |
            trivy-image-scan.json
            sbom.json
          retention-days: 7

      - name: Wait for Evidence Processing
        run: sleep 15

      - name: Evaluate Security Gate
        id: evaluate-gate
        env:
          SECURITY_GATE_URL: ${{ secrets.SECURITY_GATE_URL }}
          SECURITY_GATE_HMAC_SECRET: ${{ secrets.SECURITY_GATE_HMAC_SECRET }}
        run: |
          echo "🔍 Security Gate 평가 중..."

          TIMESTAMP=$(date +%s)
          EVAL_PATH="/v1/decisions/evaluate"

          EVAL_BODY=$(cat <<EOF
          {
            "release_id": "${{ env.IMAGE_DIGEST }}",
            "env": "staging",
            "gate": "STAGING_PROMOTE",
            "context": {
              "commit_sha": "${{ github.sha }}",
              "repository": "${{ github.repository }}",
              "actor": "${{ github.actor }}",
              "run_id": "${{ github.run_id }}"
            }
          }
          EOF
          )
          EVAL_BODY=$(echo "$EVAL_BODY" | jq -c '.')

          SIGNATURE=$(echo -n "${TIMESTAMP}.POST.${EVAL_PATH}.${EVAL_BODY}" | \
            openssl dgst -sha256 -hmac "$SECURITY_GATE_HMAC_SECRET" | cut -d' ' -f2)

          EVAL_RESPONSE=$(curl -s -X POST "${SECURITY_GATE_URL}${EVAL_PATH}" \
            -H "X-SG-Timestamp: $TIMESTAMP" \
            -H "X-SG-Signature: $SIGNATURE" \
            -H "Content-Type: application/json" \
            -d "$EVAL_BODY")

          echo "Gate Response: $EVAL_RESPONSE"

          DECISION=$(echo "$EVAL_RESPONSE" | jq -r '.decision // "UNKNOWN"')
          DECISION_ID=$(echo "$EVAL_RESPONSE" | jq -r '.decision_id // ""')
          POLICY_VERSION=$(echo "$EVAL_RESPONSE" | jq -r '.policy_version // ""')
          REASONS=$(echo "$EVAL_RESPONSE" | jq -c '.reasons // []')

          echo "Decision: $DECISION"

          if [ "$DECISION" == "PASS" ]; then
            GATE_PASSED="true"
          else
            GATE_PASSED="false"
            echo "Gate 실패 사유:"
            echo "$EVAL_RESPONSE" | jq '.reasons[]'
          fi

          echo "decision=$DECISION" >> $GITHUB_OUTPUT
          echo "decision_id=$DECISION_ID" >> $GITHUB_OUTPUT
          echo "passed=$GATE_PASSED" >> $GITHUB_OUTPUT

          echo "GATE_PASSED=$GATE_PASSED" >> $GITHUB_ENV
          echo "GATE_DECISION=$DECISION" >> $GITHUB_ENV
          echo "GATE_DECISION_ID=$DECISION_ID" >> $GITHUB_ENV
          echo "GATE_REASONS<<EOF" >> $GITHUB_ENV
          echo "$REASONS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # ─────────────────────────────────────────────────────
      # Gate FAIL 시: Slack 알림
      # ─────────────────────────────────────────────────────

      - name: Notify Slack on Gate Failure
        if: env.GATE_PASSED != 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.M4CNCH2Z_BOT_SLACK_WEBHOOK_URL }}
        run: |
          echo "Security Gate FAILED - Slack 알림 전송"

          REASONS_TEXT=$(echo '${{ env.GATE_REASONS }}' | jq -r '.[] | "• \(.code): \(.message)"' 2>/dev/null || echo "• 상세 사유 없음")

          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"text\": \"[WEB] Security Gate FAILED\",
                \"blocks\": [
                  {
                    \"type\": \"header\",
                    \"text\": {
                      \"type\": \"plain_text\",
                      \"text\": \"🌐 Web Security Gate 검증 실패\"
                    }
                  },
                  {
                    \"type\": \"section\",
                    \"fields\": [
                      {\"type\": \"mrkdwn\", \"text\": \"*Repository:*\n${{ github.repository }}\"},
                      {\"type\": \"mrkdwn\", \"text\": \"*Decision:*\n${{ env.GATE_DECISION }}\"},
                      {\"type\": \"mrkdwn\", \"text\": \"*Commit:*\n\`${{ github.sha }}\`\"},
                      {\"type\": \"mrkdwn\", \"text\": \"*Actor:*\n${{ github.actor }}\"}
                    ]
                  },
                  {
                    \"type\": \"section\",
                    \"text\": {
                      \"type\": \"mrkdwn\",
                      \"text\": \"*Image Digest:*\n\`${{ env.IMAGE_DIGEST }}\`\"
                    }
                  },
                  {
                    \"type\": \"section\",
                    \"text\": {
                      \"type\": \"mrkdwn\",
                      \"text\": \"*실패 사유:*\n${REASONS_TEXT}\"
                    }
                  },
                  {
                    \"type\": \"actions\",
                    \"elements\": [
                      {
                        \"type\": \"button\",
                        \"text\": {\"type\": \"plain_text\", \"text\": \"📋 Workflow 보기\"},
                        \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                      }
                    ]
                  }
                ]
              }"
          else
            echo "SLACK_WEBHOOK_URL이 설정되지 않았습니다"
          fi

      - name: Gate Failure Summary
        if: env.GATE_PASSED != 'true'
        run: |
          echo "::error::Security Gate FAILED - Staging Promote PR이 생성되지 않습니다."

          echo "## 🚨 Security Gate 검증 실패 (Web)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 📋 기본 정보" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Image Digest | \`${{ env.IMAGE_DIGEST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Decision | **${{ env.GATE_DECISION }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 🔴 Critical Vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "trivy-image-scan.json" ]; then
            CRITICAL_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-image-scan.json)

            if [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo "| Package | Current | Fixed | CVE |" >> $GITHUB_STEP_SUMMARY
              echo "|---------|---------|-------|-----|" >> $GITHUB_STEP_SUMMARY
              jq -r '.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL") | "| \(.PkgName) | \(.InstalledVersion) | \(.FixedVersion // "N/A") | \(.VulnerabilityID) |"' trivy-image-scan.json | head -20 >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY

              if [ "$CRITICAL_COUNT" -gt 20 ]; then
                echo "> ⚠️ 외 $((CRITICAL_COUNT - 20))건 더 있음. Artifact에서 전체 JSON 확인" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "Critical 취약점 없음" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "스캔 결과 파일 없음" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 📝 Gate 실패 사유" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo '${{ env.GATE_REASONS }}' | jq '.' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 보안 취약점을 수정한 후 다시 시도해주세요." >> $GITHUB_STEP_SUMMARY

          exit 1

      # ─────────────────────────────────────────────────────
      # Gate PASS 시: Staging Promote PR 생성
      # ─────────────────────────────────────────────────────

      - name: Update Staging Manifest
        if: env.GATE_PASSED == 'true'
        run: |
          echo "Security Gate PASSED - Manifest 업데이트"
          wget -q https://github.com/mikefarah/yq/releases/download/v4.40.5/yq_linux_amd64 -O /tmp/yq
          chmod +x /tmp/yq
          /tmp/yq e -i "(.images[] | select(.name == \"763479270202.dkr.ecr.ap-northeast-2.amazonaws.com/dark-mac-cheese-web\")).newTag = \"${{ github.sha }}\"" ${{ env.MANIFEST_FILE }}
          /tmp/yq e -i "(.images[] | select(.name == \"763479270202.dkr.ecr.ap-northeast-2.amazonaws.com/dark-mac-cheese-web\")).digest = \"${{ env.IMAGE_DIGEST }}\"" ${{ env.MANIFEST_FILE }}

          echo "Updated ${{ env.MANIFEST_FILE }}:"
          cat ${{ env.MANIFEST_FILE }}
      
      - name: Cleanup Temporary Files & Revert Permissions
        if: always() 
        run: |
          echo "Cleaning up Trivy cache and artifacts..."
          sudo rm -rf .cache
          sudo rm -rf .trivy
          rm -f trivy-image-scan.json sbom.json
          
          echo "Reverting script permissions..."
          git checkout .github/scripts/
        
      - name: Create Staging Promote PR
        if: env.GATE_PASSED == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(staging): promote Web image ${{ github.sha }}"
          title: "🌐 Deploy(Staging): Promote Web Image"
          body: |
            ## Staging 배포 요청 (Web)

            Security Gate 검증을 통과한 Web 이미지입니다.

            ### 이미지 정보
            | 항목 | 값 |
            |------|-----|
            | Repository | `${{ env.ECR_REPOSITORY }}` |
            | Tag | `${{ github.sha }}` |
            | Digest | `${{ env.IMAGE_DIGEST }}` |

            ### Security Gate
            - **Decision:** ${{ env.GATE_DECISION }}
            - **Decision ID:** `${{ env.GATE_DECISION_ID }}`

            ### Links
            - [Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - [Commit](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            ---
            > 이 PR을 머지하면 Staging 환경에 자동 배포됩니다.
          branch: "deploy/staging-web-${{ github.sha }}"
          base: "main"
          delete-branch: true
          labels: |
            deployment
            staging
            auto-generated
            web

      - name: Success Summary
        if: env.GATE_PASSED == 'true'
        run: |
          echo "## ✅ Build & Security Gate 성공 (Web)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.ECR_REPOSITORY }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ env.IMAGE_DIGEST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Decision | **${{ env.GATE_DECISION }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Decision ID | \`${{ env.GATE_DECISION_ID }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Staging Promote PR이 생성되었습니다." >> $GITHUB_STEP_SUMMARY
