name: API Build & Deploy (Staging)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'apps/api/**'
      - 'apps/api/**.md'
      - '!infra/k8s/overlays/staging/kustomization.yaml' # 배포 설정 파일 변경은 무시 (무한 루프 방지)
  workflow_dispatch:
    inputs:
      image_digest:
        description: '기존 이미지 digest(sha256:... 또는 해시)로 재실행'
        required: false
        type: string

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: shoppingmall-api
  MANIFEST_FILE: infra/k8s/overlays/staging/kustomization.yaml
  AWS_ROLE_ARN: arn:aws:iam::763479270202:role/GitHubActionsECRRole

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  build-image:
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      image_digest: ${{ steps.set-digest.outputs.image_digest || steps.build-image.outputs.digest }}
      full_image: ${{ steps.set-digest.outputs.full_image || steps.build-image.outputs.full_image }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Image Digest from Input
        id: set-digest
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.image_digest != ''
        env:
          INPUT_DIGEST: ${{ github.event.inputs.image_digest }}
        run: |
          if [[ "$INPUT_DIGEST" == sha256:* ]]; then
            DIGEST_ONLY="${INPUT_DIGEST#sha256:}"
          else
            DIGEST_ONLY="$INPUT_DIGEST"
          fi

          echo "image_digest=$DIGEST_ONLY" >> $GITHUB_OUTPUT
          echo "full_image=" >> $GITHUB_OUTPUT
          echo "IMAGE_DIGEST=$DIGEST_ONLY" >> $GITHUB_ENV

      - name: Set up JDK 21
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.image_digest == ''
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build with Gradle
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.image_digest == ''
        working-directory: ./apps/api
        run: |
          chmod +x gradlew
          ./gradlew clean bootJar -x test

      - name: Configure AWS Credentials
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.image_digest == ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.image_digest == ''
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.image_digest == ''
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        working-directory: ./apps/api
        run: |
          echo "골든 이미지를 사용하여 Docker 빌드를 시작합니다..."

          docker build \
            --build-arg ECR_REGISTRY=$ECR_REGISTRY \
            --build-arg GOLDEN_TAG=1.0.0 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

          PUSH_OUTPUT=$(docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG)

          FULL_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG)
          DIGEST_ONLY=$(echo $FULL_DIGEST | cut -d'@' -f2)

          echo "Full Image: $FULL_DIGEST"
          echo "Digest: $DIGEST_ONLY"

          echo "digest=$DIGEST_ONLY" >> $GITHUB_OUTPUT
          echo "full_image=$FULL_DIGEST" >> $GITHUB_OUTPUT
          echo "IMAGE_DIGEST=$DIGEST_ONLY" >> $GITHUB_ENV
          echo "FULL_IMAGE=$FULL_DIGEST" >> $GITHUB_ENV

  scan-and-gate:
    runs-on: ubuntu-latest
    environment: staging
    needs: build-image
    outputs:
      gate_passed: ${{ steps.evaluate-gate.outputs.passed }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run Trivy Image Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}'
          format: 'json'
          output: 'trivy-image-scan.json'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}'
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload Image Scan to Security Gate
        id: upload-scan
        env:
          SECURITY_GATE_URL: ${{ secrets.SECURITY_GATE_URL }}
          SECURITY_GATE_HMAC_SECRET: ${{ secrets.SECURITY_GATE_HMAC_SECRET }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_JOB: ${{ github.job }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_ACTOR: ${{ github.actor }}
          IMAGE_DIGEST: ${{ needs.build-image.outputs.image_digest }}
        run: |
          chmod +x .github/scripts/scan-upload.sh
          .github/scripts/scan-upload.sh trivy-image-scan.json 0 "${IMAGE_DIGEST}"

      - name: Upload SBOM to Security Gate
        env:
          SECURITY_GATE_URL: ${{ secrets.SECURITY_GATE_URL }}
          SECURITY_GATE_HMAC_SECRET: ${{ secrets.SECURITY_GATE_HMAC_SECRET }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_JOB: ${{ github.job }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_ACTOR: ${{ github.actor }}
          IMAGE_DIGEST: ${{ needs.build-image.outputs.image_digest }}
        run: |
          chmod +x .github/scripts/sbom-upload.sh
          .github/scripts/sbom-upload.sh sbom.json 0 "${IMAGE_DIGEST}"

      - name: Save Scan Results as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            trivy-image-scan.json
            sbom.json
          retention-days: 7

      - name: Wait for Evidence Processing
        run: sleep 15

      - name: Evaluate Security Gate
        id: evaluate-gate
        env:
          SECURITY_GATE_URL: ${{ secrets.SECURITY_GATE_URL }}
          SECURITY_GATE_HMAC_SECRET: ${{ secrets.SECURITY_GATE_HMAC_SECRET }}
          IMAGE_DIGEST: ${{ needs.build-image.outputs.image_digest }}
        run: |
          echo " Security Gate 평가 중..."

          TIMESTAMP=$(date +%s)
          EVAL_PATH="/v1/decisions/evaluate"

          EVAL_BODY=$(cat <<EOF
          {
            "release_id": "${IMAGE_DIGEST}",
            "env": "staging",
            "gate": "STAGING_PROMOTE",
            "context": {
              "commit_sha": "${{ github.sha }}",
              "repository": "${{ github.repository }}",
              "actor": "${{ github.actor }}",
              "run_id": "${{ github.run_id }}"
            }
          }
          EOF
          )
          EVAL_BODY=$(echo "$EVAL_BODY" | jq -c '.')

          SIGNATURE=$(echo -n "${TIMESTAMP}.POST.${EVAL_PATH}.${EVAL_BODY}" | \
            openssl dgst -sha256 -hmac "$SECURITY_GATE_HMAC_SECRET" | cut -d' ' -f2)

          EVAL_RESPONSE=$(curl -s -X POST "${SECURITY_GATE_URL}${EVAL_PATH}" \
            -H "X-SG-Timestamp: $TIMESTAMP" \
            -H "X-SG-Signature: $SIGNATURE" \
            -H "Content-Type: application/json" \
            -d "$EVAL_BODY")

          echo "Gate Response: $EVAL_RESPONSE"

          DECISION=$(echo "$EVAL_RESPONSE" | jq -r '.decision // "UNKNOWN"')
          DECISION_ID=$(echo "$EVAL_RESPONSE" | jq -r '.decision_id // ""')
          POLICY_VERSION=$(echo "$EVAL_RESPONSE" | jq -r '.policy_version // ""')
          REASONS=$(echo "$EVAL_RESPONSE" | jq -c '.reasons // []')

          echo "Decision: $DECISION"

          if [ "$DECISION" == "PASS" ]; then
            GATE_PASSED="true"
          else
            GATE_PASSED="false"
            echo "Gate 실패 사유:"
            echo "$EVAL_RESPONSE" | jq '.reasons[]'
          fi

          echo "decision=$DECISION" >> $GITHUB_OUTPUT
          echo "decision_id=$DECISION_ID" >> $GITHUB_OUTPUT
          echo "passed=$GATE_PASSED" >> $GITHUB_OUTPUT

          echo "GATE_PASSED=$GATE_PASSED" >> $GITHUB_ENV
          echo "GATE_DECISION=$DECISION" >> $GITHUB_ENV
          echo "GATE_DECISION_ID=$DECISION_ID" >> $GITHUB_ENV
          echo "GATE_REASONS<<EOF" >> $GITHUB_ENV
          echo "$REASONS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Notify Slack on Gate Failure
        if: env.GATE_PASSED != 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.M4CNCH2Z_BOT_SLACK_WEBHOOK_URL }}
        run: |
          echo "Security Gate FAILED - Slack 알림 전송"

          REASONS_TEXT=$(echo '${{ env.GATE_REASONS }}' | jq -r '.[] | "• \(.code): \(.message)"' 2>/dev/null || echo "• 상세 사유 없음")

          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"text\": \"Security Gate FAILED\",
                \"blocks\": [
                  {
                    \"type\": \"header\",
                    \"text\": {
                      \"type\": \"plain_text\",
                      \"text\": \"Security Gate 검증 실패\"
                    }
                  },
                  {
                    \"type\": \"section\",
                    \"fields\": [
                      {\"type\": \"mrkdwn\", \"text\": \"*Repository:*\\n${{ github.repository }}\"},
                      {\"type\": \"mrkdwn\", \"text\": \"*Decision:*\\n${{ env.GATE_DECISION }}\"},
                      {\"type\": \"mrkdwn\", \"text\": \"*Commit:*\\n\\`${{ github.sha }}\\`\"},
                      {\"type\": \"mrkdwn\", \"text\": \"*Actor:*\\n${{ github.actor }}\"}
                    ]
                  },
                  {
                    \"type\": \"section\",
                    \"text\": {
                      \"type\": \"mrkdwn\",
                      \"text\": \"*Image Digest:*\\n\\`${{ needs.build-image.outputs.image_digest }}\\`\"
                    }
                  },
                  {
                    \"type\": \"section\",
                    \"text\": {
                      \"type\": \"mrkdwn\",
                      \"text\": \"*실패 사유:*\\n${REASONS_TEXT}\"
                    }
                  },
                  {
                    \"type\": \"actions\",
                    \"elements\": [
                      {
                        \"type\": \"button\",
                        \"text\": {\"type\": \"plain_text\", \"text\": \"📋 Workflow 보기\"},
                        \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                      }
                    ]
                  }
                ]
              }"
          else
            echo "SLACK_WEBHOOK_URL이 설정되지 않았습니다"
          fi

      - name: Gate Failure Summary
        if: env.GATE_PASSED != 'true'
        run: |
          echo "::error::Security Gate FAILED - Staging Promote PR이 생성되지 않습니다."

          echo "## 🚨 Security Gate 검증 실패" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 📋 기본 정보" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Image Digest | \`${{ needs.build-image.outputs.image_digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Decision | **${{ env.GATE_DECISION }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 🔴 Critical Vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "trivy-image-scan.json" ]; then
            CRITICAL_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-image-scan.json)

            if [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo "| Package | Current | Fixed | CVE |" >> $GITHUB_STEP_SUMMARY
              echo "|---------|---------|-------|-----|" >> $GITHUB_STEP_SUMMARY
              jq -r '.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL") | "| \(.PkgName) | \(.InstalledVersion) | \(.FixedVersion // "N/A") | \(.VulnerabilityID) |"' trivy-image-scan.json | head -20 >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY

              if [ "$CRITICAL_COUNT" -gt 20 ]; then
                echo "> ⚠️ 외 $((CRITICAL_COUNT - 20))건 더 있음. Artifact에서 전체 JSON 확인" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "Critical 취약점 없음" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "스캔 결과 파일 없음" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 📝 Gate 실패 사유" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo '${{ env.GATE_REASONS }}' | jq '.' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 보안 취약점을 수정한 후 다시 시도해주세요." >> $GITHUB_STEP_SUMMARY

          exit 1

  local-pentest:
    runs-on: [self-hosted]
    defaults:
      run:
        shell: powershell
    needs: build-image
    outputs:
      gate_passed: ${{ steps.pentest-decision.outputs.passed }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull Image by Digest
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_DIGEST: ${{ needs.build-image.outputs.image_digest }}
        run: |
          if ($env:IMAGE_DIGEST -and -not $env:IMAGE_DIGEST.StartsWith("sha256:")) {
            $digest = "sha256:$env:IMAGE_DIGEST"
          } else {
            $digest = $env:IMAGE_DIGEST
          }
          $apiImage = "$env:ECR_REGISTRY/${{ env.ECR_REPOSITORY }}@$digest"
          Write-Host "API_IMAGE=$apiImage"
          "API_IMAGE=$apiImage" | Out-File -FilePath $env:GITHUB_ENV -Append
          & wsl.exe -e bash -lc "docker pull '$apiImage'"

      - name: Start Local Target (Docker Compose)
        env:
          API_IMAGE: ${{ env.API_IMAGE }}
        run: |
          $ws = & wsl.exe wslpath -a -u $env:GITHUB_WORKSPACE
          & wsl.exe -e bash -lc "cd '$ws' && API_IMAGE='$env:API_IMAGE' docker compose -f docker-compose.pentest.yml -p local-pentest up -d"

      - name: Wait for API Healthy
        env:
          API_IMAGE: ${{ env.API_IMAGE }}
        run: |
          $ws = & wsl.exe wslpath -a -u $env:GITHUB_WORKSPACE
          $scriptPath = Join-Path $env:GITHUB_WORKSPACE "artifacts\wait-api.sh"
          $script = @'
          API_CID=$(docker compose -f docker-compose.pentest.yml -p local-pentest ps -q api)
          if [ -z "$API_CID" ]; then
            echo "API 컨테이너를 찾을 수 없습니다."
            exit 1
          fi

          for i in $(seq 1 30); do
            STATUS=$(docker inspect -f '{{.State.Health.Status}}' "$API_CID" 2>/dev/null || echo "starting")
            if [ "$STATUS" = "healthy" ]; then
              echo "API가 정상 상태입니다."
              exit 0
            fi
            echo "API 상태 대기 중... ($i/30) - $STATUS"
            sleep 5
          done

          echo "API healthcheck 타임아웃"
          exit 1
          '@
          New-Item -ItemType Directory -Force -Path (Split-Path $scriptPath) | Out-Null
          [System.IO.File]::WriteAllText($scriptPath, ($script -replace "`r`n", "`n"))
          & wsl.exe -e bash -lc "cd '$ws' && API_IMAGE='$env:API_IMAGE' bash ./artifacts/wait-api.sh"

      - name: Fetch OpenAPI JSON
        env:
          OPENAPI_URL: http://api:8080/v3/api-docs
        run: |
          $ws = & wsl.exe wslpath -a -u $env:GITHUB_WORKSPACE
          $script = @"
          mkdir -p artifacts
          curl -sS '$env:OPENAPI_URL' -o artifacts/openapi.json
          "@
          & wsl.exe -e bash -lc "cd '$ws' && $script"

      - name: Request Pentest Run
        env:
          PENTEST_API_URL: ${{ secrets.PENTEST_API_URL }}
          PENTEST_AUTH_USERNAME: ${{ secrets.PENTEST_AUTH_USERNAME }}
          PENTEST_AUTH_PASSWORD: ${{ secrets.PENTEST_AUTH_PASSWORD }}
          PENTEST_AUTH_CREDENTIALS_JSON: ${{ secrets.PENTEST_AUTH_CREDENTIALS_JSON }}
          TARGET_URL: http://api:8080
          RELEASE_ID: ${{ needs.build-image.outputs.image_digest }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if (-not $env:PENTEST_API_URL) {
            Write-Host "PENTEST_API_URL이 설정되지 않았습니다."
            exit 1
          }

          $ws = & wsl.exe wslpath -a -u $env:GITHUB_WORKSPACE
          $script = @"
          AUTH_CREDENTIALS_ARG=""
          if [ -n "$env:PENTEST_AUTH_CREDENTIALS_JSON" ]; then
            echo "$env:PENTEST_AUTH_CREDENTIALS_JSON" | jq empty || {
              echo "PENTEST_AUTH_CREDENTIALS_JSON이 유효한 JSON이 아닙니다."
              exit 1
            }
            AUTH_CREDENTIALS_ARG="--argjson auth_credentials $env:PENTEST_AUTH_CREDENTIALS_JSON"
          fi

          REQUEST_BODY=\$(jq -n \
            --arg target_url "$env:TARGET_URL" \
            --arg release_id "$env:RELEASE_ID" \
            --arg run_id "$env:RUN_ID" \
            --arg auth_username "$env:PENTEST_AUTH_USERNAME" \
            --arg auth_password "$env:PENTEST_AUTH_PASSWORD" \
            --argfile openapi artifacts/openapi.json \
            \$AUTH_CREDENTIALS_ARG \
            '{
              target_url: $target_url,
              spec: $openapi,
              release_id: $release_id,
              run_id: $run_id
            }
            + (if $auth_username != "" and $auth_password != "" then {auth_username:$auth_username,auth_password:$auth_password} else {} end)
            + (if (has("auth_credentials")) then {auth_credentials:$auth_credentials} else {} end)')

          RESPONSE=\$(curl -sS -X POST "${env:PENTEST_API_URL%/}/api-calls" \
            -H "Content-Type: application/json" \
            -d "\$REQUEST_BODY")

          echo "\$RESPONSE" > artifacts/pentest-run.json
          RUN_TOKEN=\$(echo "\$RESPONSE" | jq -r '.run_id // empty')

          if [ -z "\$RUN_TOKEN" ]; then
            echo "펜테스트 실행 요청 실패:"
            echo "\$RESPONSE"
            exit 1
          fi
          echo "\$RUN_TOKEN"
          "@
          $runToken = & wsl.exe -e bash -lc "cd '$ws' && $script"
          "RUN_TOKEN=$runToken" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Wait for Pentest Result
        env:
          PENTEST_API_URL: ${{ secrets.PENTEST_API_URL }}
        run: |
          $ws = & wsl.exe wslpath -a -u $env:GITHUB_WORKSPACE
          $script = @"
          for i in \$(seq 1 30); do
            RESULT=\$(curl -sS -X GET "${env:PENTEST_API_URL%/}/api-calls/$env:RUN_TOKEN")
            STATUS=\$(echo "\$RESULT" | jq -r '.status // "unknown"')

            if [ "\$STATUS" = "done" ] || [ "\$STATUS" = "failed" ]; then
              echo "\$RESULT" > artifacts/pentest-result.json
              break
            fi

            echo "펜테스트 진행 중... (\$i/30) - \$STATUS"
            sleep 10
          done

          if [ ! -f artifacts/pentest-result.json ]; then
            echo "펜테스트 결과 타임아웃"
            exit 1
          fi
          "@
          & wsl.exe -e bash -lc "cd '$ws' && $script"

      - name: Download Pentest Report
        run: |
          $ws = & wsl.exe wslpath -a -u $env:GITHUB_WORKSPACE
          & wsl.exe -e bash -lc "cd '$ws' && cp artifacts/pentest-result.json artifacts/raw_report.json"

      - name: Build Pentest Summary
        env:
          RELEASE_ID: ${{ needs.build-image.outputs.image_digest }}
          RUN_ID: ${{ github.run_id }}
        run: |
          $ws = & wsl.exe wslpath -a -u $env:GITHUB_WORKSPACE
          $script = @"
          RAW_REPORT="artifacts/raw_report.json"
          if [ ! -f "\$RAW_REPORT" ]; then
            echo '{"error":"raw_report.json not found"}' > "\$RAW_REPORT"
            echo '{"summary":{"tool":"custom-pentest","findings_total":0,"findings_high":0,"findings_medium":0,"findings_low":0},"metadata":{"note":"raw_report.json not found"}}' > artifacts/results.json
            exit 0
          fi

          TOTAL=\$(jq '[.result.findings[]?] | length' "\$RAW_REPORT" 2>/dev/null || echo 0)
          HIGH=\$(jq '[.result.findings[]? | select(.severity=="HIGH")] | length' "\$RAW_REPORT" 2>/dev/null || echo 0)
          MEDIUM=\$(jq '[.result.findings[]? | select(.severity=="MEDIUM")] | length' "\$RAW_REPORT" 2>/dev/null || echo 0)
          LOW=\$(jq '[.result.findings[]? | select(.severity=="LOW")] | length' "\$RAW_REPORT" 2>/dev/null || echo 0)

          jq -n \
            --arg release_id "$env:RELEASE_ID" \
            --arg run_id "$env:RUN_ID" \
            --arg report_file "raw_report.json" \
            --argjson total "\$TOTAL" \
            --argjson high "\$HIGH" \
            --argjson medium "\$MEDIUM" \
            --argjson low "\$LOW" \
            '{
              summary: {
                tool: "custom-pentest",
                findings_total: $total,
                findings_high: $high,
                findings_medium: $medium,
                findings_low: $low
              },
              metadata: {
                release_id: $release_id,
                run_id: $run_id,
                raw_report: $report_file
              }
            }' > artifacts/results.json
          "@
          & wsl.exe -e bash -lc "cd '$ws' && $script"

      - name: Upload Pentest Evidence to Security Gate
        env:
          SECURITY_GATE_URL: ${{ secrets.SECURITY_GATE_URL }}
          SECURITY_GATE_HMAC_SECRET: ${{ secrets.SECURITY_GATE_HMAC_SECRET }}
          SG_ENV: local
          SG_GATE: LOCAL_PENTEST
          SG_EVIDENCE_TYPE: LOCAL_PENTEST
          SG_ARTIFACT_NAME: raw_report.json
          SG_RELEASE_ID: ${{ needs.build-image.outputs.image_digest }}
          SG_SUMMARY_FILE: artifacts/results.json
        run: |
          $ws = & wsl.exe wslpath -a -u $env:GITHUB_WORKSPACE
          & wsl.exe -e bash -lc "cd '$ws' && chmod +x .github/scripts/sg-upload.sh && .github/scripts/sg-upload.sh artifacts/raw_report.json 0"

      - name: Evaluate Local Pentest Gate
        id: pentest-decision
        run: |
          $script = @'
          DECISION=$(jq -r '.decision // "UNKNOWN"' /tmp/sg-eval-result 2>/dev/null || echo "UNKNOWN")
          DECISION_ID=$(jq -r '.decision_id // ""' /tmp/sg-eval-result 2>/dev/null || echo "")
          REASONS=$(jq -c '.reasons // []' /tmp/sg-eval-result 2>/dev/null || echo "[]")

          echo "Decision: $DECISION"

          if [ "$DECISION" == "PASS" ]; then
            GATE_PASSED="true"
          else
            GATE_PASSED="false"
            echo "Gate 실패 사유:"
            echo "$REASONS" | jq '.'
          fi

          echo "decision=$DECISION" >> $GITHUB_OUTPUT
          echo "decision_id=$DECISION_ID" >> $GITHUB_OUTPUT
          echo "passed=$GATE_PASSED" >> $GITHUB_OUTPUT

          if [ "$GATE_PASSED" != "true" ]; then
            exit 1
          fi
          '@
          $ws = & wsl.exe wslpath -a -u $env:GITHUB_WORKSPACE
          & wsl.exe -e bash -lc "cd '$ws' && $script"

      - name: Upload Pentest Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-pentest-results
          path: |
            artifacts/results.json
            artifacts/raw_report.json
            artifacts/openapi.json
            artifacts/pentest-run.json
            artifacts/pentest-result.json
          retention-days: 7

      - name: Cleanup Local Containers
        if: always() && steps.pentest-decision.outputs.passed == 'true'
        env:
          API_IMAGE: ${{ env.API_IMAGE }}
        run: |
          $ws = & wsl.exe wslpath -a -u $env:GITHUB_WORKSPACE
          & wsl.exe -e bash -lc "cd '$ws' && API_IMAGE='$env:API_IMAGE' docker compose -f docker-compose.pentest.yml -p local-pentest down -v"

  deploy-secrets:
    runs-on: ubuntu-latest
    environment: staging
    needs: [scan-and-gate, local-pentest]
    if: needs.scan-and-gate.outputs.gate_passed == 'true' && needs.local-pentest.outputs.gate_passed == 'true'
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig (EKS)
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name devsecops-cluster
          kubectl config current-context

      - name: Apply staging secrets
        run: |
          kubectl -n staging create secret generic api-env-secret \
            --from-literal=SPRING_DATASOURCE_PASSWORD="${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
            --from-literal=AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}" \
            --from-literal=AWS_S3_BUCKET="${{ secrets.AWS_S3_BUCKET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

  update-manifest:
    runs-on: ubuntu-latest
    environment: staging
    needs: [build-image, scan-and-gate, local-pentest, deploy-secrets]
    if: needs.scan-and-gate.outputs.gate_passed == 'true' && needs.local-pentest.outputs.gate_passed == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update Staging Manifest
        run: |
          echo "Security Gate PASSED - Manifest 업데이트"
          wget -q https://github.com/mikefarah/yq/releases/download/v4.40.5/yq_linux_amd64 -O /tmp/yq
          chmod +x /tmp/yq
          /tmp/yq e -i "(.images[] | select(.name == \"763479270202.dkr.ecr.ap-northeast-2.amazonaws.com/shoppingmall-api\")).newTag = \"${{ github.sha }}\"" ${{ env.MANIFEST_FILE }}
          /tmp/yq e -i "(.images[] | select(.name == \"763479270202.dkr.ecr.ap-northeast-2.amazonaws.com/shoppingmall-api\")).digest = \"${{ needs.build-image.outputs.image_digest }}\"" ${{ env.MANIFEST_FILE }}

          echo "Updated ${{ env.MANIFEST_FILE }}:"
          cat ${{ env.MANIFEST_FILE }}

      - name: Remove Trivy cache (임시 파일 삭제)
        run: |
          sudo rm -rf .cache
          sudo rm -rf .trivy

      - name: Cleanup Artifacts
        run: |
          rm -f trivy-image-scan.json sbom.json
          git checkout .github/scripts/

      - name: Create Staging Promote PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(staging): promote API image ${{ github.sha }}"
          title: "🚀 Deploy(Staging): Promote API Image"
          body: |
            ## Staging 배포 요청

            Security Gate 검증을 통과한 이미지입니다.

            ### 이미지 정보
            | 항목 | 값 |
            |------|-----|
            | Repository | `${{ env.ECR_REPOSITORY }}` |
            | Tag | `${{ github.sha }}` |
            | Digest | `${{ needs.build-image.outputs.image_digest }}` |

            ### Security Gate
            - **Decision:** PASS

            ### Links
            - [Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - [Commit](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            ---
            > 이 PR을 머지하면 Staging 환경에 자동 배포됩니다.
          branch: "deploy/staging-api-${{ github.sha }}"
          base: "main"
          delete-branch: true
          labels: |
            deployment
            staging
            auto-generated

      - name: Success Summary
        run: |
          echo "## Build & Security Gate 성공" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.ECR_REPOSITORY }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ needs.build-image.outputs.image_digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Decision | **PASS** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Staging Promote PR이 생성되었습니다." >> $GITHUB_STEP_SUMMARY
