name: security-gate-test

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      release_id:
        description: "Release image digest (sha256:<64hex>)"
        required: true
      gate:
        description: "Gate name"
        default: "PR"
        required: true
      env:
        description: "Environment"
        default: "pr"
        required: true

jobs:
  decision-evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate security gate decision
        env:
          SG_URL: ${{ secrets.SECURITY_GATE_URL }}
          SG_SECRET: ${{ secrets.SECURITY_GATE_HMAC_SECRET }}
          SG_RELEASE_ID: ${{ inputs.release_id || secrets.SECURITY_GATE_RELEASE_ID }}
          SG_GATE: ${{ inputs.gate || 'PR' }}
          SG_ENV: ${{ inputs.env || 'pr' }}
          SG_REPO: ${{ github.repository }}
          SG_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          SG_PR_NUMBER: ${{ github.event.pull_request.number || 0 }}
        run: |
          set -euo pipefail
          if [ -z "${SG_URL}" ] || [ -z "${SG_SECRET}" ]; then
            echo "Missing SECURITY_GATE_URL or SECURITY_GATE_HMAC_SECRET" >&2
            exit 1
          fi
          if [ -z "${SG_RELEASE_ID}" ]; then
            SG_RELEASE_ID="sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
          fi

          echo "SG_URL=${SG_URL}"
          echo "SG_REPO=${SG_REPO}"
          echo "SG_COMMIT_SHA=${SG_COMMIT_SHA}"
          echo "SG_PR_NUMBER=${SG_PR_NUMBER}"
          echo "SG_RELEASE_ID=${SG_RELEASE_ID}"
          echo "SG_GATE=${SG_GATE}"
          echo "SG_ENV=${SG_ENV}"

          body=$(python3 - <<PY
          import json
          print(json.dumps({
            "release_id": "${SG_RELEASE_ID}",
            "env": "${SG_ENV}",
            "gate": "${SG_GATE}",
            "context": {
              "repo": "${SG_REPO}",
              "commit_sha": "${SG_COMMIT_SHA}",
              "pr_number": ${SG_PR_NUMBER}
            }
          }))
          PY
          )

          echo "Request body: ${body}"

          ts=$(date +%s)
          sig=$(python3 - <<PY
          import hmac, hashlib
          secret=b"$SG_SECRET"
          msg=b"$ts.POST./v1/decisions/evaluate." + """$body""".encode()
          print(hmac.new(secret, msg, hashlib.sha256).hexdigest())
          PY
          )

          response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}\n" -X POST "${SG_URL%/}/v1/decisions/evaluate" \
            -H "Content-Type: application/json" \
            -H "X-SG-Timestamp: ${ts}" \
            -H "X-SG-Signature: ${sig}" \
            --data-binary "${body}")

          echo "${response}"

  slack-notify:
    runs-on: ubuntu-latest
    needs: [decision-evaluate]
    if: always()
    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.M4CnCH2Z_BOT_SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "Missing M4CnCH2Z_BOT_SLACK_WEBHOOK_URL" >&2
            exit 1
          fi
          payload=$(python3 - <<PY
          import json
          print(json.dumps({
            "text": "security-gate-test: decision-evaluate workflow completed. Repo=${{ github.repository }}, Run=${{ github.run_id }}."
          }))
          PY
          )
          curl -sS -X POST -H "Content-Type: application/json" --data "${payload}" "${SLACK_WEBHOOK_URL}"
