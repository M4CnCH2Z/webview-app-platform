name: Android Release

on:
  push:
    tags:
      - "android-v*"
  workflow_dispatch: {}

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: android-release
      url: https://play.google.com/console/placeholder
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - name: Build release (placeholder)
        working-directory: apps/android
        run: |
          ./gradlew assembleRelease
      - name: Sign & Upload (placeholder)
        run: |
          echo "Signing and Play Store upload placeholder. Configure secrets and signing configs before enabling."
