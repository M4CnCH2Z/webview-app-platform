apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-shopping-api
  namespace: staging
  annotations:
    argocd-image-updater.argoproj.io/image-list: api=763479270202.dkr.ecr.ap-northeast-2.amazonaws.com/shoppingmall-api
    argocd-image-updater.argoproj.io/api.update-strategy: latest
    argocd-image-updater.argoproj.io/write-back-method: git
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-api
  template:
    metadata:
      labels:
        app: my-api
    spec:
      containers:
      - name: my-api
        image: 763479270202.dkr.ecr.ap-northeast-2.amazonaws.com/shoppingmall-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: LOG_DIR
          value: /app/logs
        - name: LOGGING_FILE_PATH
          value: /app/logs
        volumeMounts:
        # --- [로그 쓰기 권한 에러 해결] ---
        - name: log-dir
          mountPath: /app/logs
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "200m"
            memory: "512Mi"
      volumes:
      - name: log-dir
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: staging
spec:
  selector:
    app: my-api
  ports:
    - port: 80
      targetPort: 8080