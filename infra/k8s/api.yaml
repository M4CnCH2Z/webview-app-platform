apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-shopping-api
  namespace: staging  # 네임스페이스 명시
  annotations:
    argocd-image-updater.argoproj.io/image-list: api=763479270202.dkr.ecr.ap-northeast-2.amazonaws.com/shoppingmall-api
    argocd-image-updater.argoproj.io/api.update-strategy: latest
    argocd-image-updater.argoproj.io/write-back-method: git
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-api
  template:
    metadata:
      labels:
        app: my-api
    spec:
      containers:
      - name: my-api
        image: 763479270202.dkr.ecr.ap-northeast-2.amazonaws.com/shoppingmall-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: LOGGING_FILE_PATH
          value: /tmp
        - name: LOGGING_FILE_NAME
          value: /tmp/spring.log
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api  
  namespace: staging
spec:
  selector:
    app: my-api
  ports:
    - port: 80
      targetPort: 8080