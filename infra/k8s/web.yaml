apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-shopping-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-web
  template:
    metadata:
      labels:
        app: my-web
    spec:
      containers:
      - name: my-web
        image: 763479270202.dkr.ecr.ap-northeast-2.amazonaws.com/shoppingmall-web:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: my-web-service
spec:
  type: LoadBalancer # 외부에서 접근 가능하도록 LoadBalancer 타입으로 설정
  selector:
    app: my-web
  ports:
    - port: 80
      targetPort: 80